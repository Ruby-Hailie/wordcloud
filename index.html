<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词云生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: rgba(255,255,255,0.08);
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #7c6af5;
    --accent2: #4ecdc4;
    --green: #3fb950;
    --red: #f85149;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #7c6af5, #4ecdc4);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  header h1 {
    font-size: 20px; font-weight: 700; letter-spacing: 0.02em;
    background: linear-gradient(90deg, #b4a8ff, #4ecdc4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  header p { font-size: 13px; color: var(--text-muted); margin-left: auto; }

  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 390px 1fr;
    height: calc(100vh - 69px);
  }

  .panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Tab bar */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab {
    flex: 1; padding: 12px 8px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--text-muted);
    background: none; border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-badge {
    background: var(--accent);
    color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 1px 5px; border-radius: 8px;
    min-width: 16px; text-align: center;
  }

  .tab-panel {
    display: none; flex-direction: column;
    padding: 20px; gap: 18px;
    overflow-y: auto; flex: 1;
  }

  .tab-panel.active { display: flex; }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: inherit; font-size: 14px; line-height: 1.7;
    padding: 12px; resize: none; outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-muted); }

  .quick-buttons { display: flex; flex-wrap: wrap; gap: 6px; }

  .quick-btn {
    padding: 4px 11px; font-size: 12px; font-family: inherit;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text-muted);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }

  .quick-btn:hover {
    background: rgba(124,106,245,0.15);
    border-color: var(--accent); color: var(--accent);
  }

  .control-group { display: flex; flex-direction: column; gap: 11px; }

  .control-row {
    display: flex; align-items: center;
    justify-content: space-between; gap: 10px;
  }

  .control-row label {
    font-size: 13px; color: var(--text-muted);
    white-space: nowrap; min-width: 70px;
  }

  input[type="range"] {
    flex: 1; -webkit-appearance: none;
    height: 4px; background: var(--surface2);
    border-radius: 2px; outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--accent);
    cursor: pointer; transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  .range-val {
    font-size: 12px; color: var(--accent); font-weight: 600;
    min-width: 36px; text-align: right;
  }

  .palette-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }

  .palette-item {
    height: 36px; border-radius: 8px; cursor: pointer;
    position: relative; border: 2px solid transparent;
    transition: all 0.2s; overflow: hidden;
  }

  .palette-item:hover { transform: scale(1.05); }

  .palette-item.active {
    border-color: #fff;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
  }

  .palette-item span {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: rgba(255,255,255,0.9);
    font-weight: 600; letter-spacing: 0.03em;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  .shape-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }

  .shape-btn {
    height: 36px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-muted); font-size: 11px; font-family: inherit;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .shape-btn:hover, .shape-btn.active {
    background: rgba(124,106,245,0.15);
    border-color: var(--accent); color: var(--accent);
  }

  .stopwords-area {
    width: 100%; height: 72px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-muted); font-family: inherit;
    font-size: 12px; padding: 10px 12px; resize: none; outline: none; line-height: 1.6;
  }

  .stopwords-area:focus { border-color: var(--accent); }

  /* ===== 词典面板 ===== */

  .dict-input-row {
    display: flex; gap: 8px; align-items: stretch;
  }

  .dict-input-row input[type="text"] {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: inherit;
    font-size: 13px; padding: 8px 12px; outline: none;
    transition: border-color 0.2s;
  }

  .dict-input-row input[type="text"]:focus { border-color: var(--accent); }
  .dict-input-row input[type="text"]::placeholder { color: var(--text-muted); }

  .dict-input-row input[type="number"] {
    width: 68px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: inherit;
    font-size: 13px; padding: 8px 10px; outline: none; text-align: center;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .dict-input-row input[type="number"]::-webkit-outer-spin-button,
  .dict-input-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .dict-input-row input[type="number"]:focus { border-color: var(--accent); }

  .add-btn {
    padding: 8px 14px; background: var(--accent);
    border: none; border-radius: 8px; color: #fff;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: opacity 0.2s;
  }

  .add-btn:hover { opacity: 0.85; }

  .dict-hint {
    font-size: 11px; color: var(--text-muted); line-height: 1.6;
    padding: 8px 10px; background: rgba(124,106,245,0.07);
    border-radius: 6px; border-left: 2px solid var(--accent);
  }

  .dict-list-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 8px;
  }

  .dict-list-header span { font-size: 11px; color: var(--text-muted); }

  .dict-actions { display: flex; gap: 6px; }

  .dict-action-btn {
    padding: 3px 10px; font-size: 11px; font-family: inherit;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-muted);
    cursor: pointer; transition: all 0.2s;
  }

  .dict-action-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .dict-action-btn.danger:hover { color: var(--red); border-color: var(--red); }

  .dict-list {
    display: flex; flex-direction: column; gap: 4px;
    max-height: 240px; overflow-y: auto;
  }

  .dict-list::-webkit-scrollbar { width: 4px; }
  .dict-list::-webkit-scrollbar-track { background: transparent; }
  .dict-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .dict-empty {
    text-align: center; padding: 28px 16px;
    color: var(--text-muted); font-size: 13px; line-height: 1.7;
  }

  .dict-empty .icon { font-size: 28px; margin-bottom: 8px; opacity: 0.3; }

  .dict-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; background: var(--surface2);
    border-radius: 8px; border: 1px solid transparent;
    transition: border-color 0.15s;
  }

  .dict-item:hover { border-color: var(--border); }

  .dict-item-word {
    flex: 1; font-size: 13px; font-weight: 600; color: var(--text);
  }

  .dict-item-weight {
    font-size: 11px; padding: 2px 8px;
    border-radius: 12px; font-weight: 700; white-space: nowrap;
  }

  .weight-high { background: rgba(63,185,80,0.15); color: var(--green); }
  .weight-mid  { background: rgba(124,106,245,0.15); color: var(--accent); }
  .weight-low  { background: rgba(139,148,158,0.15); color: var(--text-muted); }

  .dict-item-del {
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; border-radius: 4px; font-size: 14px;
    transition: all 0.15s; flex-shrink: 0;
  }

  .dict-item-del:hover { background: rgba(248,81,73,0.15); color: var(--red); }

  .import-export-row { display: flex; gap: 8px; }

  .ie-btn {
    flex: 1; padding: 8px; font-size: 12px; font-family: inherit;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-muted);
    cursor: pointer; transition: all 0.2s; text-align: center;
  }

  .ie-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  .dict-search {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: inherit;
    font-size: 13px; padding: 7px 12px; outline: none;
    transition: border-color 0.2s;
  }

  .dict-search:focus { border-color: var(--accent); }
  .dict-search::placeholder { color: var(--text-muted); }

  /* toggle */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .toggle-label { font-size: 13px; color: var(--text-muted); }

  .toggle {
    width: 36px; height: 20px; background: var(--surface2);
    border-radius: 10px; cursor: pointer; position: relative;
    border: 1px solid var(--border); transition: background 0.2s; flex-shrink: 0;
  }

  .toggle::after {
    content: ''; position: absolute;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--text-muted); top: 2px; left: 2px; transition: all 0.2s;
  }

  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle.on::after { left: 18px; background: #fff; }

  /* palette/bg/shape */
  .bg-color-row { display: flex; gap: 7px; flex-wrap: wrap; }

  .bg-swatch {
    width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
    border: 2px solid transparent; transition: all 0.2s;
  }

  .bg-swatch.active, .bg-swatch:hover { border-color: #fff; transform: scale(1.1); }

  /* bottom buttons */
  .panel-footer {
    padding: 16px 20px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  }

  .generate-btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #7c6af5, #5b51d8);
    border: none; border-radius: var(--radius);
    color: #fff; font-family: inherit; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s; letter-spacing: 0.04em;
  }

  .generate-btn:hover { opacity: 0.88; }
  .generate-btn:active { transform: scale(0.98); }

  .export-btn {
    width: 100%; padding: 9px; background: transparent;
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text-muted); font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }

  .export-btn:hover { background: var(--surface2); color: var(--text); }

  /* canvas area */
  .canvas-area {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 28px; background: var(--bg); position: relative; overflow: hidden;
  }

  .canvas-wrap {
    position: relative; border-radius: 14px; overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
  }

  #wc-canvas { display: block; }

  .tooltip {
    position: fixed; background: rgba(20,20,30,0.92);
    backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; padding: 7px 13px; font-size: 13px; color: #fff;
    pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100; white-space: nowrap;
  }

  .tooltip strong { color: var(--accent); }
  .tooltip span { color: var(--text-muted); font-size: 12px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  .stats-bar {
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 18px;
    background: rgba(22,27,34,0.85); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 30px;
    padding: 7px 20px; font-size: 12px; color: var(--text-muted); white-space: nowrap;
  }

  .stats-bar span strong { color: var(--text); font-weight: 600; }

  .loading-overlay {
    position: absolute; inset: 0;
    background: rgba(13,17,23,0.7);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; z-index: 10;
  }

  .spinner {
    width: 34px; height: 34px;
    border: 3px solid rgba(124,106,245,0.2);
    border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-muted); }

  .panel-scroll { display: flex; flex-direction: column; gap: 18px; overflow-y: auto; flex: 1; padding: 20px; }
</style>
</head>
<body>

<header>
  <div class="logo-icon">☁</div>
  <h1>词云生成器</h1>
  <p>输入文字，生成美观词云</p>
</header>

<div class="main">
  <div class="panel">

    <!-- Tab 导航 -->
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('text')">✏️ 文本输入</button>
      <button class="tab" onclick="switchTab('dict')" id="dict-tab">📖 自定义词典 <span class="tab-badge" id="dict-badge" style="display:none">0</span></button>
      <button class="tab" onclick="switchTab('style')">🎨 样式设置</button>
    </div>

    <!-- 文本输入面板 -->
    <div class="tab-panel active" id="tab-text">
      <div>
        <div class="section-label">输入文本</div>
        <textarea id="input-text" style="height:200px" placeholder="在此输入文本，支持中文、英文及混合内容。词语出现频次越高，在词云中显示越大。

可以粘贴文章、评论、歌词、诗歌等任意内容…"></textarea>
        <div class="quick-buttons" style="margin-top:8px">
          <button class="quick-btn" onclick="loadSample('tech')">科技文章</button>
          <button class="quick-btn" onclick="loadSample('poem')">古诗词</button>
          <button class="quick-btn" onclick="loadSample('food')">美食评论</button>
          <button class="quick-btn" onclick="loadSample('city')">城市生活</button>
          <button class="quick-btn" onclick="clearText()">清空</button>
        </div>
      </div>

      <div>
        <div class="section-label">过滤停用词（逗号分隔）</div>
        <textarea class="stopwords-area" id="stopwords">的, 了, 是, 在, 和, 与, 也, 都, 但, 而, 这, 那, 有, 一, 不, 我, 你, 他, 她, 它, 们, 中, 为, 以, 所, 很, 就, 对, 可, 又, 上, 下, 来, 去, 到, 出, 着, 过, 没, 只, 还, 会, 时, 把, 被, 要, 多, 少, 让, 说, 个, 人, 大, 小, 地</textarea>
      </div>
    </div>

    <!-- 词典面板 -->
    <div class="tab-panel" id="tab-dict">

      <div class="dict-hint">
        自定义词典可以指定词语及其权重，权重越高词语显示越大。词典词语会被优先识别，适合专业术语、品牌名、人名等。
      </div>

      <div>
        <div class="section-label">添加词条</div>
        <div class="dict-input-row" style="margin-bottom:6px">
          <input type="text" id="dict-word" placeholder="输入词语" maxlength="20" onkeydown="if(event.key==='Enter')addDictWord()">
          <input type="number" id="dict-weight" placeholder="权重" value="10" min="1" max="100">
          <button class="add-btn" onclick="addDictWord()">添加</button>
        </div>
        <div style="font-size:11px; color:var(--text-muted); padding:0 2px">权重范围 1–100，默认 10；权重 ≥ 30 为高权重（红色标签）</div>
      </div>

      <div>
        <div class="dict-list-header">
          <span id="dict-count-label">词典为空</span>
          <div class="dict-actions">
            <button class="dict-action-btn" onclick="importDict()">导入</button>
            <button class="dict-action-btn" onclick="exportDict()">导出</button>
            <button class="dict-action-btn danger" onclick="clearDict()">清空</button>
          </div>
        </div>
        <input type="text" class="dict-search" id="dict-search" placeholder="搜索词典…" oninput="renderDictList()" style="margin-bottom:8px">
        <div class="dict-list" id="dict-list">
          <div class="dict-empty"><div class="icon">📖</div>词典为空<br>添加词语后，分词将优先识别这些词</div>
        </div>
      </div>

      <div class="import-export-row">
        <label class="ie-btn" style="cursor:pointer">
          📂 从文件导入
          <input type="file" accept=".txt,.csv,.json" style="display:none" onchange="importFromFile(event)">
        </label>
        <button class="ie-btn" onclick="loadPresetDict('tech')">💻 预设：科技词汇</button>
        <button class="ie-btn" onclick="loadPresetDict('brand')">🏷️ 预设：常用品牌</button>
      </div>

    </div>

    <!-- 样式面板 -->
    <div class="tab-panel" id="tab-style">
      <div class="panel-scroll" style="padding:0; overflow:visible">

        <div>
          <div class="section-label">配色方案</div>
          <div class="palette-grid" id="palette-grid"></div>
        </div>

        <div>
          <div class="section-label">背景颜色</div>
          <div class="bg-color-row" id="bg-row"></div>
        </div>

        <div>
          <div class="section-label">词云形状</div>
          <div class="shape-grid" id="shape-grid"></div>
        </div>

        <div class="control-group">
          <div class="section-label">参数调节</div>
          <div class="control-row">
            <label>词语数量</label>
            <input type="range" id="word-count" min="20" max="200" value="80" step="5">
            <span class="range-val" id="wc-val">80</span>
          </div>
          <div class="control-row">
            <label>最大字号</label>
            <input type="range" id="font-max" min="40" max="120" value="72" step="4">
            <span class="range-val" id="fm-val">72</span>
          </div>
          <div class="control-row">
            <label>词语间距</label>
            <input type="range" id="padding" min="1" max="10" value="3" step="1">
            <span class="range-val" id="pd-val">3</span>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">允许竖排文字</span>
            <div class="toggle" id="rotate-toggle" onclick="toggleRotate()"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- 底部固定按钮 -->
    <div class="panel-footer">
      <button class="generate-btn" onclick="generateCloud()">✦ 生成词云</button>
      <button class="export-btn" onclick="exportPNG()">↓ 导出 PNG 图片</button>
    </div>

  </div>

  <!-- 词云画布区 -->
  <div class="canvas-area" id="canvas-area">
    <div class="loading-overlay" id="loading" style="display:none">

// ===== Tab 切换 =====
function switchTab(name) {

// ===== 词典功能 =====
function addDictWord() {
  const wordEl = document.getElementById('dict-word');
  const weightEl = document.getElementById('dict-weight');
  const word = wordEl.value.trim();
  const weight = Math.min(100, Math.max(1, parseInt(weightEl.value) || 10));

  if (!word) { wordEl.focus(); return; }
  if (customDict.find(d => d.word === word)) {
    // 更新已有词
    customDict = customDict.map(d => d.word === word ? { word, weight } : d);
  } else {
    customDict.push({ word, weight });
  }
  wordEl.value = '';
  wordEl.focus();
  updateDictUI();
}

function removeDictWord(word) {
  customDict = customDict.filter(d => d.word !== word);
  updateDictUI();
}

function clearDict() {
  if (customDict.length === 0) return;
  if (!confirm('确定清空全部词典词条？')) return;
  customDict = [];
  updateDictUI();
}

function updateDictUI() {
  const badge = document.getElementById('dict-badge');
  const countLabel = document.getElementById('dict-count-label');
  const n = customDict.length;
  if (n > 0) {
    badge.style.display = 'inline';
    badge.textContent = n;
    countLabel.textContent = `共 ${n} 条词典词条`;
  } else {
    badge.style.display = 'none';
    countLabel.textContent = '词典为空';
  }
  renderDictList();
}

function renderDictList() {
  const list = document.getElementById('dict-list');
  const query = document.getElementById('dict-search').value.trim().toLowerCase();
  const filtered = query
    ? customDict.filter(d => d.word.toLowerCase().includes(query))
    : customDict;

  if (customDict.length === 0) {
    list.innerHTML = '<div class="dict-empty"><div class="icon">📖</div>词典为空<br>添加词语后，分词将优先识别这些词</div>';
    return;
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div class="dict-empty"><div class="icon">🔍</div>没有匹配的词条</div>';
    return;
  }

  const sorted = [...filtered].sort((a, b) => b.weight - a.weight);
  list.innerHTML = sorted.map(d => {
    const cls = d.weight >= 30 ? 'weight-high' : d.weight >= 10 ? 'weight-mid' : 'weight-low';
    const label = d.weight >= 30 ? '高' : d.weight >= 10 ? '中' : '低';
    return `<div class="dict-item">
      <span class="dict-item-word">${escHtml(d.word)}</span>
      <span class="dict-item-weight ${cls}">权重 ${d.weight} · ${label}</span>
      <button class="dict-item-del" onclick="removeDictWord('${escHtml(d.word)}')" title="删除">×</button>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function exportDict() {
  if (customDict.length === 0) { alert('词典为空，无法导出'); return; }
  const lines = customDict.map(d => `${d.word}\t${d.weight}`).join('\n');
  const blob = new Blob(['# 词云词典\n# 格式：词语<TAB>权重\n' + lines], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '词云词典_' + new Date().toLocaleDateString('zh') + '.txt';
  a.click();
}

function importDict() {
  const text = prompt('粘贴词典内容（每行一个词，格式：词语 或 词语\\t权重）：');
  if (!text) return;
  parseAndMergeDict(text);
}

function importFromFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    parseAndMergeDict(ev.target.result);
    e.target.value = '';
  };
  reader.readAsText(file, 'utf-8');
}

function parseAndMergeDict(text) {
  const lines = text.split(/[\n\r]+/);
  let added = 0;
  lines.forEach(line => {
    line = line.trim();
    if (!line || line.startsWith('#')) return;
    // 支持 JSON 数组行：["词",权重]
    if (line.startsWith('[')) {
      try {
        const arr = JSON.parse(line);
        if (Array.isArray(arr) && arr[0]) {
          const word = String(arr[0]).trim();
          const weight = Math.min(100, Math.max(1, parseInt(arr[1]) || 10));
          if (word) { mergeDictWord(word, weight); added++; }
        }
      } catch(e) {}
      return;
    }
    // 支持 tab 或空格分隔
    const parts = line.split(/\t|,|，/).map(p => p.trim());
    const word = parts[0];
    const weight = Math.min(100, Math.max(1, parseInt(parts[1]) || 10));
    if (word && word.length >= 1) { mergeDictWord(word, weight); added++; }
  });
  updateDictUI();
  if (added > 0) alert(`成功导入 ${added} 条词典词条`);
  else alert('未识别到有效词条，请检查格式');
}

function mergeDictWord(word, weight) {
  const existing = customDict.find(d => d.word === word);
  if (existing) existing.weight = weight;
  else customDict.push({ word, weight });
}

function loadPresetDict(type) {
  const preset = PRESET_DICTS[type];
  if (!preset) return;
  preset.forEach(([word, weight]) => mergeDictWord(word, weight));
  updateDictUI();
  alert(`已加载 ${preset.length} 条预设词条（已合并到现有词典）`);
}

// ===== 分词 =====
function tokenizeChinese(text) {
  const freq = {};
  const stopwords = new Set(
    document.getElementById('stopwords').value.split(/[,，\s]+/).map(w => w.trim()).filter(Boolean)
  );

  // 1) 先处理自定义词典：对整个文本做完整扫描，找到词典词后记录并标记
  const dictMap = {};
  customDict.forEach(d => { dictMap[d.word] = d.weight; });

  // 将文本中的词典词优先识别
  const dictMatched = new Set();
  if (customDict.length > 0) {
    // 按词长降序排列避免短词先匹配
    const dictWords = [...customDict].sort((a, b) => b.word.length - a.word.length);
    let maskedText = text;
    dictWords.forEach(({ word, weight }) => {
      if (stopwords.has(word)) return;
      const regex = new RegExp(escapeRegex(word), 'g');
      const count = (maskedText.match(regex) || []).length;
      if (count > 0) {
        freq[word] = (freq[word] || 0) + count * weight;
        dictMatched.add(word);
      }
    });
  }

  // 2) 普通滑窗分词
  const chunks = text.split(/[\n\r。！？…""''【】《》「」、；：,.!?;:"'\[\]()（）\s]+/);
  chunks.forEach(chunk => {
    if (!chunk.trim()) return;
    const isChinese = /^[\u4e00-\u9fff]+$/.test(chunk);
    if (isChinese) {
      // 滑窗：优先跳过已被词典匹配的区域
      for (let len = 4; len >= 2; len--) {
        for (let i = 0; i <= chunk.length - len; i++) {
          const w = chunk.substring(i, i + len);
          if (!stopwords.has(w) && !dictMatched.has(w)) {
            freq[w] = (freq[w] || 0) + (len - 1);
          }
        }
      }
      for (let i = 0; i < chunk.length; i++) {
        const c = chunk[i];
        if (!stopwords.has(c) && !dictMatched.has(c)) {
          freq[c] = (freq[c] || 0) + 0.3;
        }
      }
    } else {
      const words = chunk.match(/[a-zA-Z\u4e00-\u9fff]+/g) || [];
      words.forEach(w => {
        if (w.length >= 2 && !stopwords.has(w) && !stopwords.has(w.toLowerCase()) && !dictMatched.has(w)) {
          freq[w] = (freq[w] || 0) + 1;
        }
      });
    }
  });

  return { freq, dictMatched };
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ===== 形状 =====
function getShapeFn(shapeId) {
  if (shapeId === 'circle') return () => 1;
  if (shapeId === 'diamond') return (t) => 1 / (Math.abs(Math.cos(t)) + Math.abs(Math.sin(t)));
  if (shapeId === 'star') return (t) => {
    const k = 5, ang = (t % (2*Math.PI/k)) - Math.PI/k;
    return Math.cos(Math.PI/k) / Math.cos(ang);
  };
  return (t) => Math.min(1/Math.abs(Math.cos(t)), 1/Math.abs(Math.sin(t)));
}

// ===== 生成词云 =====
function generateCloud() {
  const text = document.getElementById('input-text').value.trim();
  if (!text) { alert('请先输入文本内容'); return; }

  document.getElementById('loading').style.display = 'flex';
  document.getElementById('empty-state').style.display = 'none';
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.display = 'block';
  wrap.style.opacity = '0.3';

  setTimeout(() => {
    const { freq, dictMatched } = tokenizeChinese(text);
    wordFreqMap = freq;

    const maxWords = parseInt(document.getElementById('word-count').value);
    const palette = PALETTES[activePalette].colors;
    const bgColor = BG_COLORS[activeBg];
    const maxFontSize = parseInt(document.getElementById('font-max').value);
    const padding = parseInt(document.getElementById('padding').value);
    const shapeId = SHAPES[activeShape].id;

    const sorted = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0, maxWords);

    document.getElementById('total-words').textContent = Object.keys(freq).length;
    document.getElementById('shown-words').textContent = sorted.length;
    document.getElementById('dict-boosted').textContent = dictMatched.size;
    document.getElementById('top-word').textContent = sorted[0] ? sorted[0][0] : '—';

    const canvas = document.getElementById('wc-canvas');
    const W = canvas.width, H = canvas.height;
    const maxVal = sorted[0]?.[1] || 1;

    const colorFn = (word) => {
      if (dictMatched.has(word)) {
        // 词典词用更亮更显眼的颜色（调色板前两个）
        const h = [...word].reduce((a,c) => a + c.charCodeAt(0), 0) % 2;
        return palette[h];
      }
      const h = [...word].reduce((a,c) => a + c.charCodeAt(0), 0) % palette.length;
      return palette[h];
    };

    try {
      WordCloud(canvas, {
        list: sorted,
        gridSize: Math.round(8 * W / 760),
        weightFactor: (size) => Math.pow(size / maxVal, 0.6) * maxFontSize,
        fontFamily: "'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif",
        fontWeight: '700',
        color: colorFn,
        rotateRatio: allowRotate ? 0.3 : 0,
        rotationSteps: 2,
        backgroundColor: bgColor,
        padding: padding,
        shape: getShapeFn(shapeId),
        minSize: 10,
        drawOutOfBound: false,
        origin: [W/2, H/2],
      });
    } catch(e) { console.error(e); }

    document.getElementById('loading').style.display = 'none';
    wrap.style.opacity = '1';
    document.getElementById('stats-bar').style.display = 'flex';
    setupTooltip(canvas, freq, dictMatched);
  }, 80);
}

function setupTooltip(canvas, freq, dictMatched) {
  const tooltip = document.getElementById('tooltip');
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    const item = WordCloud.isWord(canvas, x, y);
    if (item) {
      const val = freq[item] || 0;
      const isDict = dictMatched && dictMatched.has(item);
      document.getElementById('tt-word').textContent = item + (isDict ? ' 📖' : '');
      document.getElementById('tt-count').textContent = Math.round(val) + (isDict ? ' (词典加权)' : '');
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 34) + 'px';
      tooltip.style.opacity = '1';
    } else {
      tooltip.style.opacity = '0';
    }
  };
  canvas.onmouseleave = () => { tooltip.style.opacity = '0'; };
}

// ===== 响应式画布 =====
window.addEventListener('resize', () => {
  const area = document.getElementById('canvas-area');
  const canvas = document.getElementById('wc-canvas');
  const maxW = area.clientWidth - 56;
  const maxH = area.clientHeight - 80;
  const aspect = 760 / 560;
  let W = Math.min(maxW, 760);
  let H = W / aspect;
  if (H > maxH) { H = maxH; W = H * aspect; }
  canvas.style.width = Math.round(W) + 'px';
  canvas.style.height = Math.round(H) + 'px';
});

initUI();
setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
</script>
</body>
